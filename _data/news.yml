- date: "Apr 2026"
  news: "🏭 I am at Hannover Messe, one of the world's largest industrial trade fairs, presenting our latest research from the <a href='https://topml.uni-mainz.de'>TOPML</a> project, funded by Carl Zeiss Stiftung. Read more <a href='https://topml.uni-mainz.de/2026/04/14/hannover-messe/'>here</a>."

- date: "Mar, 2026"
  news: "📄 New preprint <a href='https://arxiv.org/abs/2603.22260'>Greater accessibility can amplify discrimination in generative AI</a> is out! Also check out our <a href='https://tai-hamburg.github.io/papers/diversevoices'>project website</a> 🎉"

- date: "Feb, 2026"
  news: "📢 Our paper, <a href='https://arxiv.org/abs/2602.16852'>Meenz bleibt Meenz, but Large Language Models Do Not Speak Its Dialect</a>, has been accepted to <b>LREC 2026</b>! See you in Mallorca, Spain 🇪🇸! 🎉"

- date: "Nov, 2025"
  news: "📢 Our paper, <a href='https://arxiv.org/abs/2509.13835'>Large Language Models Discriminate Against Speakers of German Dialects</a>, was featured across major German news outlets, including <a href='https://www.tagesschau.de/wissen/forschung/ki-diskriminiert-dialekte-100.html'>Tagesschau (Online)</a>, <a href='https://www.faz.net/aktuell/rhein-main/region-und-hessen/ki-hat-vorurteile-gegenueber-dialekten-accg-200307030.html'>Frankfurter Allgemeine (Newspaper)</a>, <a href='https://www.swr3.de/aktuell/nachrichten/ki-dialekte-vorurteile-100.html#:~:text=Das%20Ergebnis%3A%20Die%20KI%20hat,%E2%80%9C%20oder%20%E2%80%9E%20ungebildet%20%E2%80%9C%20bewertet'>SWR3 (Radio)</a>, and <a href='https://www.youtube.com/watch?v=Ntoe8kwjp8A'>BR (TV)</a>! 🎉"

- date: "Sep, 2025"
  news: "📢 Two of our papers, <a href='https://arxiv.org/abs/2509.13835'>Large Language Models Discriminate Against Speakers of German Dialects</a> and <a href='https://arxiv.org/abs/2509.15020'>A Closer Look at Tokenization for Multiple-Choice Question Answering</a>, have been accepted to <b>EMNLP 2025 (Main)</b>! See you in Suzhou, China 🇨🇳! 🎉"

- date: "Jun, 2025"
  news: "📢 Our paper, <a href='https://arxiv.org/pdf/2506.02591'>On Generalization across Measurement Systems</a>, has been accepted to <b>ACL 2025 (Main)</b>! See you in Vienna, Austria 🇦🇹! 🎉"

- date: "May, 2025"
  news: "🏆 We're thrilled to share that our paper, <a href='https://aclanthology.org/2025.naacl-long.490/'>Multi³Hate</a>, has received the <b>Outstanding Paper Award</b> at NAACL 2025!"

- date: "Jan, 2025"
  news: "📢 Our paper, <a href='https://aclanthology.org/2025.naacl-long.490/'>Multi³Hate</a>, has been accepted to <b>NAACL 2025 (Main)</b>! See you in Albuquerque, New Mexico 🇺🇸! 🎉"

- date: "Oct, 2024"
  news: "✅ Finished my research visit! Check out our work on multicultural hate speech: <a href='https://arxiv.org/abs/2411.03888'>Multi³Hate</a>."

- date: "May, 2024"
  news: "🏫 Started my research visit at the University of Hamburg in the research group led by Prof. Dr. <a href='https://anne-lauscher.de'>Anne Lauscher</a> for the next four months!"

- date: "Apr, 2024"
  news: "📢 I attended NAACL 2024 in Mexico City 🇲🇽! Two of our papers were accepted to workshops: <a href='https://aclanthology.org/2024.insights-1.6/'>Knowledge Distillation vs. Pretraining from Scratch</a> at the <b>5th Workshop on Insights from Negative Results in NLP</b>, and <a href='https://aclanthology.org/2024.trustnlp-1.4/'>The Trade-off between Performance, Efficiency, and Fairness in Adapter Modules</a> at the <b>4th Workshop on Trustworthy NLP (TrustNLP)</b>. 🥈 Additionally, we secured <b>2nd place</b> in the Shared Task of <b>AmericasNLP 2024</b>! 🎉 Read our <a href='https://aclanthology.org/2024.americasnlp-1.23/'>system description paper</a>!"

- date: "Sep, 2023"
  news: "🎓 Began my PhD at the <a href='https://nala-cub.github.io'>NALA Group</a>, hosted by <b>JGU</b> and the <b>University of Colorado Boulder</b>, under the supervision of Prof. Dr. <a href='https://scholar.google.de/citations?user=3XF5bqEAAAAJ&hl=en'>Katharina von der Wense</a> (née Kann)!"
